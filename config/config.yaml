# ============================================================
# RNA Flanking Sequence Pipeline — Configuration
# ============================================================

# --- Input ---
input_fastas:
  - "resources/RNAChallenge.fa"
  # - "input_fastas/transcripts2.fasta"

# --- Flanking window (base pairs) ---
upstream_bp: 1000
downstream_bp: 1000

# --- NCBI credentials ---
# Register at: https://www.ncbi.nlm.nih.gov/account/
ncbi_api_key: "fdc3c3e0bf43bfebc561e789a0884b879308"
ncbi_email: "daniel.garciaruano@ibgc.cnrs.fr"

# --- Ensembl BioMart settings ---
# Pinned release for reproducibility.
# Check https://www.ensembl.org/info/website/archives/index.html
ensembl_release: "115"

# --- Ensembl species overrides (OPTIONAL) ---
# The pipeline auto-detects species from transcript ID prefixes using a
# built-in reference table covering all current Ensembl vertebrates.
# Only add entries here if:
#   (a) the pipeline reports an unknown prefix and you know what it maps to, OR
#   (b) you want to override the built-in build version for a species.
# Format: <TRANSCRIPT_PREFIX>: {species: "<ensembl_species_name>", build: "<assembly>"}
# Example:
# ensembl_species_overrides:
#   ENSXETR: {species: "xenopus_tropicalis", build: "UCB_Xtro_10.0"}
ensembl_species_overrides:
    ENSBTAT: {species: "bos_taurus", build: "ARS-UCD2.0"}
    ENSSSCT: {species: "sus_scrofa", build: "Sscrofa11.1"}

# --- Cache ---
cache_dir: "resources/cache"

# --- API settings (NCBI + UCSC) ---
max_retries: 3
retry_wait_seconds: 5
ncbi_batch_size: 50

# --- External ID resolution ---
# Use common Ensembl REST endpoint for all species (plants subdomain is frequently down).
ensembl_rest_base: "https://rest.ensembl.org"
# Set to true to skip ALL REST calls (use metadata tables only)
skip_rest_lookups: false
# Skip REST for plant IDs only (use metadata) while allowing REST for non-plant species
skip_rest_for_plants: true

# Optional per-species metadata tables (tab-separated) for fast local lookup.
# Columns required:
#   transcript_id, gene_id, gene_symbol, assembly_accession, chrom, start, end, strand
# Will be downloaded automatically via BioMart if not present
external_metadata_tables:
  arabidopsis_thaliana: "resources/metadata/arabidopsis_thaliana.tsv"
  oryza_sativa: "resources/metadata/oryza_sativa.tsv"
  zea_mays: "resources/metadata/zea_mays.tsv"
  solanum_lycopersicum: "resources/metadata/solanum_lycopersicum.tsv"
  glycine_max: "resources/metadata/glycine_max.tsv"

# --- Output ---
results_dir: "results"
logs_dir: "logs"
benchmarks_dir: "benchmarks"
