phytozome_gtf_sources:
  # This file contains the sources for the GTF files from Phytozome.
  # Each entry corresponds to a species, with the following fields:
  # - species_query: The query string to use in the Phytozome API to find the genome.
  # - genome_id: The Phytozome genome ID for the species (used for validation).
  # - gtf: The path to the GTF file for the species (relative to the project root).
  citrus_sinensis:
    species_query: "Citrus sinensis"   # q= param for the API
    phytozome_version: 10              # ff[phytozome_version]= param for the API
    genome_id: 154                     # genome_id= param for the API
    gtf: "resources/phytozome/Csinensis_154_v1.1.gene.gff3.gz"

  amborella_trichopoda:
    species_query: "Amborella trichopoda"
    phytozome_version: "v1.0"
    genome_id: 291
    gtf: "resources/phytozome/amborella_trichopoda.gff3.gz"
    notes: >
      Phytozome genome_id 291 resolves to Amborella trichopoda v1.0.
      Portal annotation file: Atrichopoda_291_v1.0.gene_exons.gff3.gz.

  chlamydomonas_reinhardtii:
    species_query: "Chlamydomonas reinhardtii"
    phytozome_version: "v5.6"
    genome_id: 281
    gtf: "resources/phytozome/chlamydomonas_reinhardtii.gff3.gz"
    notes: >
      Phytozome genome_id 281 resolves to Chlamydomonas reinhardtii v5.6.
      Portal annotation file: Creinhardtii_281_v5.6.gene_exons.gff3.gz.

  glycine_max:
    species_query: "Glycine max"
    phytozome_version: 13
    genome_id: 275
    gtf: "resources/phytozome/glycine_max.gff3.gz"
    notes: >
      Added for Glyma* transcript IDs via JGI Phytozome.
      Portal page: https://data.jgi.doe.gov/refine-download/phytozome?genome_id=275

  sorghum_bicolor:
    species_query: "Sorghum bicolor"
    phytozome_version: 11
    genome_id: 313
    gtf: "resources/phytozome/Sbicolor_313_v3.1.gene.gff3.gz"
    notes: >
      Used in RNAPlonc.
      RNAPlonc uses GreeNC which uses Phytozone V10.
      Genome ID is searched in GreeNC by manually checking the species page:
      http://greenc.sequentiabiotech.com/wiki/Species:Sorghum_bicolor.
      Manually checking Phytozome V10 API returned no annotation files.
      I used Phytozome V11

  ricinus_communis:
    species_query: "Ricinus communis"
    phytozome_version: 10
    genome_id: 119
    gtf: "resources/phytozome/Rcommunis_119_v0.1.gene.gff3.gz"
    notes: >
      Used in RNAPlonc.
      RNAPlonc uses GreeNC which uses Phytozone V10.
      Genome ID is searched in GreeNC by manually checking the species page:
      http://greenc.sequentiabiotech.com/wiki/Species:Ricinus_communis

      Important to note how IDs do not have any string prefix, but have
      directly the chromosome ID. This requires a special handling.

  oryza_sativa:
    species_query: Oryza sative Japonicus group
    phytozome_version: 10
    genome_id: 204
    gtf: "resources/phytozome/Osativa_204_v7.0.gene.gff3.gz"
    notes: >
      28 rize transcripts have the LOC_ prefix. These are not found in any of the current
      tools, so may come from CNIT. As a default, for now, I am using phytozome 10.

  zea_mays:
    species_query: "Zea mays B73"
    phytozome_version: 13
    genome_id: 833
    gtf: "resources/ensembl_plants/Zea_maysb73v4.AGPv4.gff3.gz"
    notes: >
      This entry is for Zea mays B73 v5, which is specific of those
      ids that start with Zm00001d. Some others are easily found in Gencode Plants
      or Gramene Maize, but not these.

  # TEMPORARILY DISABLED 2026-07-12 — no local GFF3 yet; needs a JGI download.
  # Re-enable once resources/phytozome/solanum_tuberosum.gff3.gz is on disk.
  solanum_tuberosum:
    species_query: "Solanum tuberosum"
    phytozome_version: 10
    genome_id: 206
    gtf: "resources/phytozome/solanum_tuberosum.gff3.gz"
    assembly_name: "PGSC_DM_v3.4"
    notes: >
      Used for potato PGSC* transcript IDs (e.g. from RNAplonc) backed by
      Phytozome annotation v3.4. Portal: https://data.jgi.doe.gov/refine-download/phytozome?genome_id=206

  # TEMPORARILY DISABLED 2026-07-12 — file PURGED on JGI tape, restore requested
  # (req 652368). Re-enable once JGI reports RESTORED, then rerun
  # resolve_phytozome_gtf + merge/extract/report. See PIPELINE_AUDIT.md Priority 0.
  physcomitrella_patens:
    species_query: "Physcomitrium patens"
    phytozome_version: "v3.3"
    genome_id: 318
    gtf: "resources/phytozome/physcomitrella_patens.gff3.gz"
    notes: >
      Phytozome genome_id 318 resolves to Physcomitrium patens v3.3.
      Portal annotation file: Ppatens_318_v3.3.gene_exons.gff3.gz.

  vitis_vinifera:
    species_query: "Vitis vinifera"
    phytozome_version: "Genoscope.12X"
    genome_id: 145
    assembly_name: "Genoscope.12X"
    gtf: "resources/phytozome/vitis_vinifera.gff3.gz"
    notes: >
      Phytozome genome_id 145 resolves to Vitis vinifera Genoscope.12X.
      Portal annotation file: Vvinifera_145_Genoscope.12X.gene_exons.gff3.gz.

  # TODO: Enable when the local GFF3 is available.
