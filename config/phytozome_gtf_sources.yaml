phytozome_gtf_sources:
  # This file contains the sources for the GTF files from Phytozome.
  # Each entry corresponds to a species, with the following fields:
  # - species_query: The query string to use in the Phytozome API to find the genome.
  # - genome_id: The Phytozome genome ID for the species (used for validation).
  # - gtf: The path to the GTF file for the species (relative to the project root).
  citrus_sinensis:
    species_query: "Citrus sinensis"   # q= param for the API
    phytozome_version: 10              # ff[phytozome_version]= param for the API 
    genome_id: 154                     # genome_id= param for the API
    gtf: "resources/phytozome/Csinensis_154_v1.1.gene_exons.gff3.gz"

  sorghum_bicolor:
    species_query: "Sorghum bicolor"
    phytozome_version: 11
    genome_id: 313
    gtf: "resources/phytozome/Sbicolor_313_v3.1.gene_exons.gff3.gz"
    notes: >
      Used in RNAPlonc.
      RNAPlonc uses GreeNC which uses Phytozone V10.
      Genome ID is searched in GreeNC by manually checking the species page:
      http://greenc.sequentiabiotech.com/wiki/Species:Sorghum_bicolor.
      Manually checking Phytozome V10 API returned no annotation files.
      I used Phytozome V11

  ricinus_communis:
    species_query: "Ricinus communis"
    phytozome_version: 10
    genome_id: 119
    gtf: "resources/phytozome/Rcommunis_119_v0.1.gene_exons.gff3.gz"
    notes: >
      Used in RNAPlonc.
      RNAPlonc uses GreeNC which uses Phytozone V10.
      Genome ID is searched in GreeNC by manually checking the species page:
      http://greenc.sequentiabiotech.com/wiki/Species:Ricinus_communis

      Important to note how IDs do not have any string prefix, but have
      directly the chromosome ID. This requires a special handling.
  
  oryza_sativa:
    species_query: Oryza sative Japonicus group
    phytozome_version: 10
    genome_id: 204
    gtf: "resources/phytozome/Osativa_204_v7.0.gene_exons.gff3.gz"
    notes: >
      28 rize transcripts have the LOC_ prefix. These are not found in any of the current
      tools, so may come from CNIT. As a default, for now, I am using phytozome 10.
  
  zea_mays:
    species_query: "Zea mays B73"
    phytozome_version: 13
    genome_id: 833
    gtf: "resources/ensembl_plants/Zea_maysb73v4.AGPv4.gff3.gz"
    notes: >
      This entry is for Zea mays B73 v5, which is specific of those
      ids that start with Zm00001d. Some others are easily found in Gencode Plants
      or Gramene Maize, but not these.